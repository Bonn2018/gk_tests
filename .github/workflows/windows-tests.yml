name: Windows Build Signing Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: # Allow manual trigger

jobs:
  sign:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Run the action
        uses: peculiarventures/goodkey-win-signtool-action@v1.1.0
        with:
          organization: "a3dac85b-0df1-48e0-8fa6-9d8b3a2cb837"
          token: ${{ secrets.CLI_SIGNING_ACCESS_TOKEN }}
          certificate: "224b501264c1454d4627268297670451aed3b0d9"
          file: "fixtures/sample-build.exe"
          timestamp_rfc3161_url: "http://timestamp.digicert.com"
          timestamp_digest_algorithm: "sha256"
          description: "This is a test file"
          description_url: "https://example.com"
          file_digest_algorithm: "sha256"

  windows-signing-tests:
    name: Windows GPG Signing Tests
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create env file
        run: |
          if (-not (Test-Path env)) { New-Item -ItemType Directory -Path env }
          echo "GOODKEY_API_URL=${{ secrets.GOODKEY_API_URL }}" | Out-File -FilePath env/.env.dev -Append -Encoding utf8
          echo "API_SIGNING_ACCESS_TOKEN=${{ secrets.API_SIGNING_ACCESS_TOKEN }}" | Out-File -FilePath env/.env.dev -Append -Encoding utf8
          echo "CLI_SIGNING_ACCESS_TOKEN=${{ secrets.CLI_SIGNING_ACCESS_TOKEN }}" | Out-File -FilePath env/.env.dev -Append -Encoding utf8
          echo "DOCKER_PORT=${{ secrets.DOCKER_PORT }}" | Out-File -FilePath env/.env.dev -Append -Encoding utf8
        shell: powershell

      - name: Install GoodKey Local Application
        run: |
          # GoodKey requires Local Application to be installed
          # The action should handle installation, but if it fails, we may need to install manually
          # Check if gkcng.dll exists
          $gkcngPath = "C:\Windows\System32\gkcng.dll"
          if (Test-Path $gkcngPath) {
            Write-Host "GoodKey DLL found. Attempting to register..."
            # Try to register with admin privileges (GitHub Actions runners usually have admin rights)
            $result = regsvr32.exe /s $gkcngPath 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "GoodKey DLL registered successfully"
            } else {
              Write-Warning "Failed to register GoodKey DLL. Exit code: $LASTEXITCODE"
              Write-Host "Output: $result"
            }
          } else {
            Write-Host "GoodKey DLL not found. The action will attempt to install it."
          }
        shell: powershell
        continue-on-error: true

      - name: Sign build file using goodkey-win-signtool-action
        uses: peculiarventures/goodkey-win-signtool-action@v1.1.0
        with:
          organization: ${{ secrets.GK_ORGANIZATION }}
          token: ${{ secrets.CLI_SIGNING_ACCESS_TOKEN }}
          certificate: ${{ secrets.GK_CERTIFICATE }}
          file: "fixtures/sample-build.exe"
          timestamp_rfc3161_url: "http://timestamp.digicert.com"
          timestamp_digest_algorithm: "sha256"

      - name: Verify signature
        run: powershell -File utils/verify-signature.ps1 -FilePath "fixtures/sample-build.exe"
        shell: powershell

      - name: Run Windows signing tests
        run: npm test -- tests/windows-gpg/signing.test.ts
        env:
          CLI_SIGNING_ACCESS_TOKEN: ${{ secrets.CLI_SIGNING_ACCESS_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test-results/
          if-no-files-found: ignore
